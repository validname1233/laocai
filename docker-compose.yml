services:
  laocai:
    container_name: laocai
    image: laocai:latest
    build:
      context: .
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./application-local.yml:/application-local.yml